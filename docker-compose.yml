version: '3.8'

services:
  app:
    build:
      context: ./deployment/docker
      dockerfile: Dockerfile
    container_name: ridoo_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - ridoo
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: ridoo_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ridoo
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ridoo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ridoo
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: ridoo
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - ridoo_mysql_data:/var/lib/mysql
    networks:
      - ridoo

  redis:
    image: redis:alpine
    container_name: ridoo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ridoo

  reverb:
    build:
      context: ./deployment/docker
      dockerfile: Dockerfile
    container_name: ridoo_reverb
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    volumes:
      - ./backend:/var/www/backend
    ports:
      - "8081:8081"
    networks:
      - ridoo
    depends_on:
      - redis
      - app

networks:
  ridoo:
    driver: bridge

volumes:
  ridoo_mysql_data:
